name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$tag" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Restore
        run: dotnet restore src/Flare.McpServer/Flare.McpServer.csproj

      - name: Build
        run: dotnet build src/Flare.McpServer/Flare.McpServer.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Flare.McpServer/Flare.McpServer.csproj --configuration Release --no-build -p:Version=${{ env.VERSION }} -o nupkg

      - name: Push to NuGet
        run: dotnet nuget push "nupkg/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nupkg/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

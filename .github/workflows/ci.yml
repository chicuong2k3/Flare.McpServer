name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Flare.McpServer/Flare.McpServer.csproj

      - name: Build
        run: dotnet build src/Flare.McpServer/Flare.McpServer.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Flare.McpServer/Flare.McpServer.csproj --configuration Release --no-build -o nupkg

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkg/*.nupkg
